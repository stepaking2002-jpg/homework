<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>domashka-lesson-42</title>
<link rel="stylesheet" href="./index.css">
</head>
<body>
    <form class="form">
        <fieldset class="form-grop">
        <legend class="legend">Ваши личные данные</legend>
        <label>Ваше имя
            <input class="input" required placeholder="имя" type="name" inputmode="name">
        </label>
        <label>Ваш возраст
            <input class="input" required placeholder="Возраст" type="number" inputmode="numeric">
        </label>
        <label>Ваш номер телефона
            <input class="input" required placeholder="Номер телефона" type="tel" inputmode="tel">
        </label>
        <label>Ваша почта
            <input class="input" required placeholder="Почта" type="email" inputmode="email">
        </label>
        </fieldset >
        <fieldset class="form-grop">Сообщение
        <textarea class="textarea" required placeholder="Ваше сообщение" name="text">
        </textarea>
        <label>
            <input class="checkbox" type="checkbox" required name="message" value="message">
        </label>Я принимаю правила
        </fieldset>
        <button class="button" tube="submit" required>Отправить
        </button>
    </form>
</body>
</html>
